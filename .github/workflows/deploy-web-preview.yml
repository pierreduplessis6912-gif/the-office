name: Deploy web preview

# Deliberately NOT the Flutter app. This deploys a small, disposable
# static HTML/CSS/JS prototype (web-preview/) used to iterate quickly
# on UX direction (the Ether manifesto) against the real live backend,
# while the Flutter app itself stays parked — UX and architecture kept
# deliberately separate, same discipline as everywhere else in this
# build. No build step at all: the file is already what gets served.
on:
  push:
    branches: [main]
    paths:
      - "web-preview/**"
      - ".github/workflows/deploy-web-preview.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-preview --project-name=the-office-preview
