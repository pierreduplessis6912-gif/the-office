name: Provision New Office

# Real feature 2026-07-19 — the DIY multi-instance provisioning
# pipeline, first real run intended for Zululand Flooring's own
# genuinely separate deployment. Manually triggered on purpose
# (workflow_dispatch) — this creates real, billable cloud resources
# and a real DNS record, not something to fire automatically until
# this has been run and verified at least once by a human who can
# watch it happen.
#
# Real fix found live 2026-07-20 (the same retry-safety discipline
# already proven for the conversational pipeline, applied here after
# a real failure partway through this exact workflow proved it was
# needed here too): every resource-creation step now checks whether
# its resource already exists before creating it, rather than blindly
# creating and failing on a second attempt. A partial failure — like
# the deploy step failing after D1/KV/R2/Vectorize/DNS already
# succeeded — no longer means starting over from scratch or manually
# cleaning up duplicates; just re-run the whole workflow again.
#
# Requires these repository secrets to exist before running:
#   PROVISION             — the "Provision" token. Real permission
#                            found missing only via an actual live
#                            run, not from documentation: User ->
#                            User Details -> Read, needed by
#                            `wrangler deploy` itself to verify who's
#                            using the token, distinct from every
#                            account/zone-level permission already
#                            confirmed working for resource creation.
#   CLOUDFLARE_ACCOUNT_ID — already exists, reused from deploy.yml
#   GOOGLE_CLIENT_ID      — reused from the existing OAuth app; a new
#                            redirect URI for this instance's callback
#                            must be added to that same Google Cloud
#                            OAuth client manually, first — this
#                            workflow cannot do that part
#   GOOGLE_CLIENT_SECRET  — same OAuth app, reused

on:
  workflow_dispatch:
    inputs:
      business_slug:
        description: "URL-safe slug (e.g. zululand-flooring) — used for every resource name and the subdomain itself"
        required: true
      owner_email:
        description: "The real Google account email for this business's Owner"
        required: true

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.PROVISION }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SLUG: ${{ github.event.inputs.business_slug }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database (safe to re-run)
        id: d1
        run: |
          # Real fix 2026-07-20, found live: relying on wrangler CLI's
          # --json support is fragile — it doesn't behave consistently
          # across every subcommand and version (a real, separate
          # failure on kv namespace list --json proved this in the
          # same session). The raw Cloudflare API is more reliable and
          # consistently documented — this exact endpoint is the one
          # already proven working, used directly during the manual
          # cleanup of this workflow's first failed run.
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=${SLUG}-db" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          EXISTING=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('result', [])
          print(results[0]['uuid'] if results else '')
          ")
          if [ -n "$EXISTING" ]; then
            echo "Real database already exists from a previous run — reusing it, not creating a duplicate."
            echo "id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            OUTPUT=$(wrangler d1 create "${SLUG}-db" 2>&1)
            echo "$OUTPUT"
            DB_ID=$(echo "$OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            if [ -z "$DB_ID" ]; then
              echo "::error::Could not parse a database ID from wrangler's output — real output above, nothing assumed."
              exit 1
            fi
            echo "id=$DB_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Create KV namespace (safe to re-run)
        id: kv
        run: |
          # Same real fix — raw API instead of wrangler's list --json,
          # which just failed live with "Unknown argument: json" for
          # this specific subcommand. This endpoint doesn't support a
          # server-side name filter the way D1's does, so the full
          # list is fetched and filtered here instead.
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          EXISTING=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('result', [])
          match = next((n for n in results if n['title'] == '${SLUG}_notes'), None)
          print(match['id'] if match else '')
          ")
          if [ -n "$EXISTING" ]; then
            echo "Real namespace already exists from a previous run — reusing it, not creating a duplicate."
            echo "id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            OUTPUT=$(wrangler kv namespace create "${SLUG}_notes" 2>&1)
            echo "$OUTPUT"
            KV_ID=$(echo "$OUTPUT" | grep -i '"id"' | grep -oE '[0-9a-f]{32}' | head -1)
            if [ -z "$KV_ID" ]; then
              echo "::error::Could not parse a KV namespace ID from wrangler's output."
              exit 1
            fi
            echo "id=$KV_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Create R2 bucket (safe to re-run)
        run: |
          wrangler r2 bucket create "${SLUG}-vault" || echo "Bucket likely already exists from a previous run — continuing."

      - name: Create Vectorize index (safe to re-run)
        run: |
          wrangler vectorize create "${SLUG}-memory" --dimensions=768 --metric=cosine || echo "Index likely already exists from a previous run — continuing."

      - name: Look up the real zone ID for websitehub.co.za
        id: zone
        run: |
          RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=websitehub.co.za" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['result'][0]['id'])")
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Could not find the zone ID for websitehub.co.za. Real response: $RESPONSE"
            exit 1
          fi
          echo "id=$ZONE_ID" >> "$GITHUB_OUTPUT"

      - name: Create the real DNS record for this instance's subdomain (safe to re-run)
        run: |
          EXISTING=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.id }}/dns_records?name=${SLUG}.websitehub.co.za" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(len(data['result']))
          ")
          if [ "$EXISTING" != "0" ]; then
            echo "Real DNS record already exists from a previous run — not creating a duplicate."
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.id }}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"${SLUG}\",\"content\":\"websitehub.co.za\",\"proxied\":true}"
          fi

      - name: Generate this instance's real wrangler.toml
        run: |
          cat > worker/wrangler.provisioned.toml << EOF
          name = "${SLUG}-api"
          main = "src/index.ts"
          compatibility_date = "2026-07-01"

          [ai]
          binding = "AI"

          [[d1_databases]]
          binding = "OFFICE_DB"
          database_name = "${SLUG}-db"
          database_id = "${{ steps.d1.outputs.id }}"

          [[r2_buckets]]
          binding = "OFFICE_VAULT"
          bucket_name = "${SLUG}-vault"

          [[vectorize]]
          binding = "MEMORY"
          index_name = "${SLUG}-memory"

          [[kv_namespaces]]
          binding = "CUSTOMER_NOTES"
          id = "${{ steps.kv.outputs.id }}"

          [vars]
          ENVIRONMENT = "production"

          [[routes]]
          pattern = "${SLUG}.websitehub.co.za/*"
          zone_name = "websitehub.co.za"

          [triggers]
          crons = ["0 * * * *"]
          EOF
          cat worker/wrangler.provisioned.toml

      - name: Deploy this instance's Worker
        working-directory: worker
        run: |
          npm install
          wrangler deploy --config wrangler.provisioned.toml

      - name: Set this instance's real secrets
        working-directory: worker
        run: |
          NEW_ADMIN_KEY=$(openssl rand -base64 32)
          NEW_SESSION_SECRET=$(openssl rand -base64 32)
          echo "$NEW_ADMIN_KEY" | wrangler secret put ADMIN_KEY --config wrangler.provisioned.toml
          echo "$NEW_SESSION_SECRET" | wrangler secret put SESSION_SECRET --config wrangler.provisioned.toml
          echo "${{ secrets.GOOGLE_CLIENT_ID }}" | wrangler secret put GOOGLE_CLIENT_ID --config wrangler.provisioned.toml
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | wrangler secret put GOOGLE_CLIENT_SECRET --config wrangler.provisioned.toml

      - name: Run schema migrations against the new instance (safe to re-run — every migration route is itself idempotent)
        run: |
          BASE="https://${SLUG}.websitehub.co.za"
          sleep 15
          for route in init-memberships init-idempotency-keys init-discount-column; do
            echo "Running /debug/$route"
            curl -s -X POST "$BASE/debug/$route"
            echo ""
          done

      - name: Seed the real owner membership (safe to re-run — the memberships table has a real UNIQUE constraint on google_email)
        run: |
          curl -s -X POST "https://${SLUG}.websitehub.co.za/debug/create-membership" \
            -H "Content-Type: application/json" \
            -d "{\"google_email\": \"${{ github.event.inputs.owner_email }}\", \"role\": \"owner\"}"

      - name: Real, honest summary of what still needs a human
        run: |
          echo "::notice::Provisioning complete for ${SLUG}. Real, remaining manual steps: (1) add https://${SLUG}.websitehub.co.za/auth/google/callback as an authorized redirect URI on the existing Google OAuth client, (2) add ${{ github.event.inputs.owner_email }} as a test user if the OAuth app is still in Testing mode, (3) verify /debug/smoke-test passes on the new instance before real use."
