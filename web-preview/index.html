<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --charcoal: #17140F;
    --charcoal-soft: #221E18;
    --paper: #F5F2EB;
    --steel: #7A766D;
    --ember-amber: #E8871E;
    --ember-red: #C4432B;
    --sage: #5C7A5C;
    --blue: #4A7FC1;
    --purple: #7A5FB8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--charcoal);
    color: var(--paper);
    font-family: 'Work Sans', sans-serif;
    height: 100%;
    overflow: hidden;
  }
  @media (prefers-reduced-motion: reduce) { *, *::before { animation-duration: 0.001ms !important; } }

  .screen {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* --- Masthead --- */
  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 16px 6px;
  }
  .menu-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    width: 40px;
    height: 40px;
    min-width: 88px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .menu-btn svg { width: 18px; height: 18px; stroke: var(--steel); stroke-width: 1.6; }
  .masthead h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--steel);
    margin: 0;
    flex: 1;
    text-align: center;
  }
  .embers {
    display: flex;
    gap: 1px;
    min-width: 88px;
    justify-content: flex-end;
  }
  /* A barely-visible hint that something lives to the right — not a
     label, not an arrow, just enough texture to be found by a
     curious thumb. Principle 25: discoverable, never displayed. */
  .edge-hint {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 44px;
    background: rgba(245,242,235,0.06);
    border-radius: 3px 0 0 3px;
    pointer-events: none;
  }
  /* Real fix, twice over: the visible dot and the tap target used to
     be the same 9px element, far below any real touch-target size —
     then the first fix widened the whole box, which pushed the dots
     apart and lost the tight, clustered look. Real touch-target
     guidance cares most about the VERTICAL dimension for a row like
     this — so height stays generous (44px) while width stays narrow,
     letting the dots themselves sit close together again. */
  .ember-dot {
    width: 20px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  /* Real shape change: a vertical slit rather than a round dot — the
     "tiger's eye" look Pierre described wanting back. A circle
     stretched vertically via unequal width/height with border-radius
     50% naturally renders as an elongated oval/slit. */
  .dot-core {
    width: 4px; height: 15px;
    border-radius: 50%;
    background: #2A2620;
    box-shadow: 0 0 2px 0 rgba(232,135,30,0.12);
    transition: transform 0.15s ease;
  }
  .ember-dot:active .dot-core { transform: scale(0.85); }

  /* Real fire behaves differently per department, not a flat on/off —
     Peter should sense the state of his business before he even reads
     the numbers. */
  .ember-dot.lit[data-dept="tasks"] .dot-core {
    background: var(--ember-amber);
    animation: flicker-tasks 3.4s ease-in-out infinite;
  }
  .ember-dot.lit[data-dept="scheduler"] .dot-core {
    background: var(--blue);
    animation: flicker-tasks 3.9s ease-in-out infinite;
    animation-delay: -1.1s;
  }
  .ember-dot.lit[data-dept="finance"] .dot-core {
    background: var(--ember-red);
    animation: glow-heavy 4.6s ease-in-out infinite;
  }
  .ember-dot.lit[data-dept="expenses"] .dot-core {
    background: var(--purple);
    animation: flicker-tasks 3.7s ease-in-out infinite;
    animation-delay: -2.2s;
  }
  @keyframes flicker-tasks {
    0%, 100% { opacity: 0.85; box-shadow: 0 0 5px 1px currentColor; }
    8%  { opacity: 0.55; box-shadow: 0 0 3px 1px currentColor; }
    22% { opacity: 1;    box-shadow: 0 0 8px 2px currentColor; }
    35% { opacity: 0.65; box-shadow: 0 0 4px 1px currentColor; }
    55% { opacity: 0.95; box-shadow: 0 0 6px 1px currentColor; }
    70% { opacity: 0.6;  box-shadow: 0 0 4px 1px currentColor; }
    85% { opacity: 0.92; box-shadow: 0 0 7px 2px currentColor; }
  }
  @keyframes glow-heavy {
    0%, 100% { opacity: 0.5;  box-shadow: 0 0 6px 1px currentColor; }
    50%      { opacity: 1;    box-shadow: 0 0 13px 3px currentColor; }
  }
  .ember-dot.lit[data-dept="tasks"] { color: var(--ember-amber); }
  .ember-dot.lit[data-dept="scheduler"] { color: var(--blue); }
  .ember-dot.lit[data-dept="finance"] { color: var(--ember-red); }
  .ember-dot.lit[data-dept="expenses"] { color: var(--purple); }
  .ember-dot.lit .dot-core { color: inherit; }

  /* Real feature: the flicker's magnitude should grow with how much
     is actually going on, not stay fixed regardless of count — barely
     alive with one or two items, genuinely brighter and more awake
     the more there is to do. Layered as a brightness multiplier on
     top of the existing flicker animations rather than rewriting
     them, so every keyframe already tuned stays exactly as designed. */
  .dot-core.tier-subtle { filter: brightness(0.7); }
  .dot-core.tier-moderate { filter: brightness(1); }
  .dot-core.tier-intense { filter: brightness(1.35); }

  /* The listening boost — Tasks flickers a little brighter while
     Office is actively paying attention, a small, real signal that
     it has leaned forward. */
  .ember-dot.listening-boost .dot-core {
    animation-duration: 1.6s !important;
    filter: brightness(1.35);
  }

  /* --- Conversation area --- */
  .stage {
    flex: 1;
    padding: 10px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
    gap: 22px;
  }
  .stage.has-content { justify-content: flex-start; padding-top: 60px; align-items: stretch; }

  .prompt-quiet {
    text-align: center;
    color: var(--steel);
  }
  .prompt-quiet .glyph {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
    font-weight: 400;
  }

  /* Light, floating text — never a solid chat bubble. Office's voice
     drifts into the void rather than announcing itself in a box. */
  .utterance {
    max-width: 100%;
    text-align: center;
    animation: drift-in 0.5s ease both;
  }
  .utterance.you {
    color: var(--steel);
    font-size: 14px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.5;
  }
  .utterance.you.live {
    color: var(--paper);
    animation: breathe-text 1.8s ease-in-out infinite;
  }
  @keyframes breathe-text {
    0%, 100% { opacity: 0.75; }
    50% { opacity: 1; }
  }
  .utterance.office {
    color: var(--paper);
    font-size: 15.5px;
    font-weight: 300;
    line-height: 1.55;
    white-space: pre-line;
  }
  .utterance.office .label {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--steel);
    font-weight: 500;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  @keyframes drift-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .listening-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .listening-indicator span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ember-amber);
    animation: bob 1s ease-in-out infinite;
  }
  .listening-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .listening-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bob { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-5px); opacity: 1; } }

  /* --- Talk control --- */
  .control {
    padding: 14px 24px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  /* The mic stays exactly centered on screen — the camera sits
     absolutely positioned to its side rather than sharing flex space
     with it, so adding a second input mode never shifts the primary
     one even a pixel. */
  .talk-row {
    position: relative;
    display: flex;
    justify-content: center;
    width: 100%;
  }
  .camera-btn {
    position: absolute;
    right: calc(50% + 62px);
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .camera-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--steel); stroke-width: 1.7; }
  .camera-btn:active svg { stroke: var(--ember-amber); transform: scale(0.92); }
  .talk-btn {
    width: 92px; height: 92px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 30%, #2E2A22, #201C16 75%);
    box-shadow: 0 0 10px 1px rgba(196,67,43,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.55s ease, box-shadow 0.55s ease, transform 0.15s ease;
    position: relative;
  }
  .talk-btn svg { width: 34px; height: 34px; fill: none; stroke: var(--paper); stroke-width: 2.2; transition: stroke 0.5s ease; }
  .talk-btn.idle { animation: idle-breathe 3.4s ease-in-out infinite; }
  @keyframes idle-breathe {
    0%, 100% { box-shadow: 0 0 8px 1px rgba(196,67,43,0.16); }
    50% { box-shadow: 0 0 14px 2px rgba(196,67,43,0.3); }
  }
  .talk-btn.recording {
    background: radial-gradient(circle at 35% 30%, #F0A54A, var(--ember-red) 75%);
    box-shadow: 0 0 0 8px rgba(196,67,43,0.18), 0 0 30px 6px rgba(196,67,43,0.65);
    transform: scale(1.05);
    animation: none;
  }
  .talk-btn.recording svg { stroke: var(--charcoal); }
  .talk-btn:active { transform: scale(0.96); }

  .talk-caption {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--steel);
  }
  .write-link {
    background: none; border: none;
    font-family: 'Work Sans', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--steel);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(122,118,109,0.4);
    padding: 4px;
  }

  /* --- The composer — where talk and text converge, living in the
     same light void as everything else Office says. Speaking fills
     it with a transcript; typing fills it directly. Either way,
     nothing goes anywhere until it's explicitly sent — the same
     guard()-before-commit discipline the backend already applies to
     structured data, extended one step earlier to the words
     themselves. No solid box, no bold button — it drifts into the
     void the same way a reply would. */
  .composer {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s ease;
    width: 100%;
  }
  .composer.active { max-height: 220px; opacity: 1; }
  .composer-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--steel);
    text-align: center;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .composer textarea {
    width: 100%;
    background: none;
    border: none;
    color: var(--paper);
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 15.5px;
    line-height: 1.5;
    text-align: center;
    resize: none;
    padding: 0 0 10px;
    min-height: 40px;
    max-height: 110px;
    transition: color 0.3s ease;
  }
  .composer textarea:focus { outline: none; color: #FDF0DD; }
  .composer-actions {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 12px;
  }
  .composer-actions button {
    border: none;
    background: none;
    font-family: 'Work Sans', sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.02em;
    cursor: pointer;
    padding: 4px;
  }
  .composer-discard { color: var(--steel); }
  .composer-send {
    color: var(--ember-amber);
    font-weight: 500;
  }

  /* --- Ember detail sheet --- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 20;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    left: 50%; bottom: 0;
    transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 480px;
    max-height: 72vh;
    background: var(--charcoal);
    border-radius: 18px 18px 0 0;
    border-top: 1px solid rgba(245,242,235,0.1);
    z-index: 21;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--steel);
    border-radius: 2px;
    margin: 10px auto 4px;
    opacity: 0.5;
  }
  .sheet-title {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 20px 12px;
  }
  .sheet-title h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0;
    color: var(--paper);
  }
  .sheet-close { background: none; border: none; color: var(--steel); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .sheet-body { overflow-y: auto; padding: 0 16px 20px; }

  .docket {
    background: var(--paper); color: var(--charcoal);
    border-radius: 3px; padding: 12px 14px 12px 16px;
    margin-bottom: 8px; position: relative;
  }
  .docket::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: var(--notch, var(--steel));
    border-radius: 3px 0 0 3px;
  }
  .docket[data-status="overdue"] { --notch: var(--ember-red); }
  .docket[data-status="open"] { --notch: var(--ember-amber); }
  .docket[data-status="settled"] { --notch: var(--sage); }
  .docket-title { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 14.5px; }
  .docket-sub { font-size: 12px; color: var(--steel); margin-top: 2px; }
  .docket-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
  .docket-amt { font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 14px; }
  .sheet-empty { text-align: center; color: var(--steel); padding: 30px; font-size: 13px; }

  /* --- Menu drawer (hamburger) --- */
  .menu-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 30;
  }
  .menu-backdrop.open { opacity: 1; pointer-events: auto; }
  .menu-drawer {
    position: fixed; top: 0; bottom: 0; left: 0;
    width: 78%; max-width: 320px;
    background: var(--charcoal-soft);
    border-right: 1px solid rgba(245,242,235,0.08);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 31;
    padding: 26px 0;
    overflow-y: auto;
  }
  .menu-drawer.open { transform: translateX(0); }
  .menu-eyebrow {
    font-family: 'Oswald', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--steel);
    padding: 4px 24px 8px;
    margin-top: 18px;
  }
  .menu-eyebrow:first-child { margin-top: 0; }
  .menu-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--paper);
    font-family: 'Work Sans', sans-serif;
    font-size: 14.5px;
    padding: 11px 24px;
    cursor: pointer;
  }
  .menu-item:active { background: rgba(245,242,235,0.05); }
  .menu-item .sub { display: block; font-size: 11.5px; color: var(--steel); margin-top: 1px; }

  /* --- History panel (swipe left) --- */
  .history-panel {
    position: fixed; inset: 0;
    background: var(--charcoal);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 25;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    left: 50%;
    margin-left: -240px;
  }
  @media (max-width: 480px) { .history-panel { left: 0; margin-left: 0; } }
  .history-panel.open { transform: translateX(0); }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 20px 14px;
    border-bottom: 1px solid rgba(245,242,235,0.06);
  }
  .history-header h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--steel);
    margin: 0;
  }
  .history-close { background: none; border: none; color: var(--steel); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px 20px 30px; }
  .history-entry {
    padding: 13px 0;
    border-bottom: 1px solid rgba(245,242,235,0.05);
  }
  .history-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--steel);
    display: block;
    margin-bottom: 3px;
  }
  .history-text { font-size: 13.5px; line-height: 1.45; color: var(--paper); }
</style>
</head>
<body>
<div class="screen" id="main-screen">
  <div class="masthead">
    <button class="menu-btn" id="menu-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <h1>The Office</h1>
    <div class="embers" id="embers">
      <button class="ember-dot" data-dept="tasks" title="Tasks"><span class="dot-core"></span></button>
      <button class="ember-dot" data-dept="scheduler" title="Schedule"><span class="dot-core"></span></button>
      <button class="ember-dot" data-dept="finance" title="Finance"><span class="dot-core"></span></button>
      <button class="ember-dot" data-dept="expenses" title="Expenses"><span class="dot-core"></span></button>
    </div>
  </div>
  <div class="edge-hint" id="edge-hint"></div>

  <div class="stage" id="stage">
    <div class="prompt-quiet" id="quiet-prompt">
      <div class="glyph">Hold to talk, or write it down</div>
    </div>

    <div class="composer" id="composer">
      <div class="composer-label" id="composer-label">Write it down</div>
      <textarea id="composer-input" placeholder="Tell Office what happened…" rows="2"></textarea>
      <div class="composer-actions">
        <button class="composer-discard" id="composer-discard">Discard</button>
        <button class="composer-send" id="composer-send">Send</button>
      </div>
    </div>
  </div>

  <div class="control">
    <div class="talk-row">
      <button class="camera-btn" id="camera-btn" aria-label="Add a photo">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <button class="talk-btn idle" id="talk-btn">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      </button>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" />
    <div class="talk-caption" id="talk-caption">Hold to talk</div>
    <button class="write-link" id="write-toggle">or write it down</button>
  </div>
</div>

<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">
    <h2 id="sheet-heading">—</h2>
    <button class="sheet-close" id="sheet-close">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="menu-backdrop" id="menu-backdrop"></div>
<div class="menu-drawer" id="menu-drawer">
  <div class="menu-eyebrow">Reports &amp; Documents</div>
  <button class="menu-item" id="menu-report-pnl">Profit &amp; Loss<span class="sub">Real, accrual-based statement</span></button>
  <button class="menu-item" id="menu-report-aged">Aged Debtors<span class="sub">Who owes what, and how long</span></button>

  <div class="menu-eyebrow">People</div>
  <div id="menu-people"><div class="menu-item"><span class="sub">Loading…</span></div></div>

  <div class="menu-eyebrow">Office</div>
  <button class="menu-item">Settings<span class="sub">Not wired in this prototype</span></button>
</div>

<div class="history-panel" id="history-panel">
  <div class="history-header">
    <h2>What's Been Said</h2>
    <button class="history-close" id="history-close">✕</button>
  </div>
  <div class="history-list" id="history-list"><div class="loading">Reading the real log <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div></div>
</div>

<script>
const API = 'https://office.websitehub.co.za';

async function safeFetch(path) {
  try {
    const res = await fetch(API + path);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

function money(n) { return 'R' + Number(n ?? 0).toLocaleString('en-ZA'); }
function todayStr() {
  const d = new Date(Date.now() + 2 * 3600 * 1000);
  return d.toISOString().slice(0, 10);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

let dataCache = {};

async function loadCounts() {
  const [tasks, jobScopes, finance, expenses] = await Promise.all([
    safeFetch('/debug/tasks'),
    safeFetch('/debug/job-scopes'),
    safeFetch('/embers/finance'),
    safeFetch('/embers/expenses'),
  ]);
  const openTasks = (tasks?.tasks ?? []).filter(t => !t.done);
  const today = todayStr();
  const scheduledToday = (jobScopes?.jobScopes ?? []).filter(j => j.scheduled_date === today);
  const outstanding = finance?.outstanding ?? [];
  const todaysExpenses = expenses?.todaysExpenses ?? [];

  const counts = { tasks: openTasks.length, scheduler: scheduledToday.length, finance: outstanding.length, expenses: todaysExpenses.length };
  Object.entries(counts).forEach(([dept, count]) => {
    const el = document.querySelector(`.ember-dot[data-dept="${dept}"]`);
    el.classList.toggle('lit', count > 0);
    // Real feature: the flicker's magnitude grows with how much is
    // actually going on. Discrete tiers rather than continuous math —
    // simpler, and real fire doesn't need infinite precision to read
    // as "barely alive" versus "genuinely a lot going on."
    const core = el.querySelector('.dot-core');
    core.classList.remove('tier-subtle', 'tier-moderate', 'tier-intense');
    if (count >= 6) core.classList.add('tier-intense');
    else if (count >= 3) core.classList.add('tier-moderate');
    else if (count >= 1) core.classList.add('tier-subtle');
  });

  dataCache = { openTasks, scheduledToday, outstanding, todaysExpenses };
}

function renderSheetBody(dept) {
  const headings = { tasks: 'Open Tasks', scheduler: "Today's Jobs", finance: 'Outstanding', expenses: "Today's Expenses" };
  document.getElementById('sheet-heading').textContent = headings[dept];

  let items = [];
  if (dept === 'tasks') {
    items = dataCache.openTasks.map(t => `<div class="docket" data-status="open"><div class="docket-title">${escapeHtml(t.description)}</div></div>`);
  } else if (dept === 'scheduler') {
    items = dataCache.scheduledToday.map(j => `<div class="docket" data-status="open"><div class="docket-title">${escapeHtml(j.description)}</div><div class="docket-sub">${escapeHtml(j.customer_name ?? 'No customer yet')}${j.installer_name ? ' · ' + escapeHtml(j.installer_name) : ''}</div></div>`);
  } else if (dept === 'finance') {
    items = dataCache.outstanding.map(c => {
      const bal = (c.invoiced ?? 0) - (c.paid ?? 0);
      return `<div class="docket" data-status="overdue"><div class="docket-row"><div><div class="docket-title">${escapeHtml(c.name)}</div><div class="docket-sub">Invoiced ${money(c.invoiced)} · Paid ${money(c.paid)}</div></div><div class="docket-amt">${money(bal)}</div></div></div>`;
    });
  } else if (dept === 'expenses') {
    items = dataCache.todaysExpenses.map(e => `<div class="docket" data-status="settled"><div class="docket-row"><div><div class="docket-title">${escapeHtml(e.supplier_name ?? 'Unnamed supplier')}</div><div class="docket-sub">${escapeHtml(e.description)}</div></div><div class="docket-amt">${money(e.amount)}</div></div></div>`);
  }
  document.getElementById('sheet-body').innerHTML = items.length ? items.join('') : `<div class="sheet-empty">Nothing here. Silence is the goal.</div>`;
}

function openSheet(dept) {
  renderSheetBody(dept);
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
document.querySelectorAll('.ember-dot').forEach(el => el.addEventListener('click', () => openSheet(el.dataset.dept)));
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
document.getElementById('sheet-close').addEventListener('click', closeSheet);

// --- Conversation stage ---
const stage = document.getElementById('stage');
const quietPrompt = document.getElementById('quiet-prompt');
const composerEl = document.getElementById('composer');

function addUtterance(text, who) {
  if (quietPrompt.parentElement) quietPrompt.remove();
  stage.classList.add('has-content');
  const b = document.createElement('div');
  b.className = 'utterance ' + who;
  if (who === 'office') {
    b.innerHTML = `<span class="label">Office</span>${escapeHtml(text)}`;
  } else {
    b.textContent = text;
  }
  stage.insertBefore(b, composerEl);
  stage.scrollTop = stage.scrollHeight;
  return b;
}

function addListening() {
  const el = document.createElement('div');
  el.className = 'listening-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  stage.insertBefore(el, composerEl);
  stage.scrollTop = stage.scrollHeight;
  return el;
}

async function sendToOffice(text) {
  addUtterance(text, 'you');
  const thinking = addListening();
  try {
    const res = await fetch(API + '/messages/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    thinking.remove();
    addUtterance(data.message || 'No response.', 'office');
  } catch (e) {
    thinking.remove();
    addUtterance('Could not reach the real Office API right now.', 'office');
  }
  loadCounts();
}

// --- The composer — the single surface both talk and text converge
// on. Nothing reaches Office until it's explicitly sent, whether it
// arrived by typing or by voice.
const composer = document.getElementById('composer');
const composerInput = document.getElementById('composer-input');
const composerLabel = document.getElementById('composer-label');

function openComposer(prefill, label) {
  if (quietPrompt.parentElement) quietPrompt.style.display = 'none';
  composerLabel.textContent = label;
  composerInput.value = prefill ?? '';
  composer.classList.add('active');
  // Real fix: calling focus() synchronously, right after adding the
  // class that triggers the CSS transition, meant mobile browsers
  // sometimes saw the textarea as still effectively zero-height and
  // refused to focus it — no keyboard, no way to type. Waiting one
  // frame lets the browser actually lay it out as visible first.
  requestAnimationFrame(() => {
    composerInput.focus();
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 120) + 'px';
  });
}
function closeComposer() {
  composer.classList.remove('active');
  composerInput.value = '';
  if (quietPrompt.parentElement && !stage.classList.contains('has-content')) {
    quietPrompt.style.display = '';
  }
}

document.getElementById('write-toggle').addEventListener('click', () => {
  if (composer.classList.contains('active')) { closeComposer(); return; }
  openComposer('', 'Write it down');
});
composerInput.addEventListener('input', () => {
  composerInput.style.height = 'auto';
  composerInput.style.height = Math.min(composerInput.scrollHeight, 120) + 'px';
});
document.getElementById('composer-discard').addEventListener('click', closeComposer);
document.getElementById('composer-send').addEventListener('click', () => {
  const text = composerInput.value.trim();
  if (!text) return;
  closeComposer();
  sendToOffice(text);
});

// --- Camera — a peer input mode alongside talk and text, not a
// menu item. Real upload to the real /files/photo endpoint; the
// device's own camera/gallery picker sheet handles choosing between
// taking a new photo or picking an existing one. ---
const photoInput = document.getElementById('photo-input');
document.getElementById('camera-btn').addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', async () => {
  const file = photoInput.files[0];
  photoInput.value = '';
  if (!file) return;

  if (quietPrompt.parentElement) quietPrompt.style.display = 'none';
  stage.classList.add('has-content');
  const thinking = addListening();

  try {
    const form = new FormData();
    form.append('photo', file);
    const res = await fetch(API + '/files/photo', { method: 'POST', body: form });
    const data = await res.json();
    thinking.remove();
    addUtterance(data.description || 'Photo received.', 'office');
  } catch (e) {
    thinking.remove();
    addUtterance('Could not reach the real Office API right now.', 'office');
  }
  loadCounts();
});

// --- Hold to talk (real browser speech recognition where available) ---
const talkBtn = document.getElementById('talk-btn');
const talkCaption = document.getElementById('talk-caption');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let finalTranscript = '';
// Real fix found on real device testing: Android's continuous
// recognizer doesn't give one clean final result per utterance — it
// repeatedly marks GROWING PREFIXES of the same ongoing utterance as
// final ("Sipho", then "Sipho went", then "Sipho went for a walk
// today"). Summing every result marked final stacked each overlapping
// prefix on top of the last, producing the exact repeating pattern
// seen live. The fix: track each result by its position — a new
// final result at the same position OVERWRITES it rather than
// appending, so however many times the browser re-finalizes the same
// segment, only its latest, most complete version survives.
let finalSegments = [];
if (SpeechRecognition) {
  recognizer = new SpeechRecognition();
  recognizer.lang = 'en-ZA';
  // Real fix: continuous defaults to false, which is exactly why
  // recognition was stopping after the first brief pause — a few
  // words in, then done. Holding the button should keep listening for
  // as long as it's held, not for as long as the browser guesses is
  // "one utterance."
  recognizer.continuous = true;
  // Real fix: interimResults was explicitly false, so nothing showed
  // until recognition ended entirely. Live, growing text as Peter
  // actually speaks is the whole point of putting it in the void.
  recognizer.interimResults = true;
  recognizer.onresult = (e) => {
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      const segment = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalSegments[i] = segment; // overwrite this position, never append
      } else {
        interim = segment; // only the most recent guess for the in-progress segment matters
      }
    }
    const final = finalSegments.filter((s) => s !== undefined).join(' ');
    finalTranscript = final;
    showLiveTranscript((final + ' ' + interim).trim());
  };
  recognizer.onerror = () => {
    talkBtn.classList.remove('recording');
    talkCaption.textContent = 'Hold to talk';
    document.querySelector('.ember-dot[data-dept="tasks"]').classList.remove('listening-boost');
    const liveEl = document.getElementById('live-transcript');
    if (liveEl) liveEl.remove();
  };
  recognizer.onend = () => {
    talkBtn.classList.remove('recording');
    talkCaption.textContent = 'Hold to talk';
    document.querySelector('.ember-dot[data-dept="tasks"]').classList.remove('listening-boost');
    const liveEl = document.getElementById('live-transcript');
    if (liveEl) liveEl.remove();
    const heard = finalTranscript.trim();
    if (heard) openComposer(heard, 'Heard you say — check it, then send');
  };
}

function showLiveTranscript(text) {
  let el = document.getElementById('live-transcript');
  if (!el) {
    if (quietPrompt.parentElement) quietPrompt.style.display = 'none';
    el = document.createElement('div');
    el.id = 'live-transcript';
    el.className = 'utterance you live';
    stage.insertBefore(el, composerEl);
  }
  el.textContent = text || 'Listening…';
}

function startTalk() {
  if (!recognizer) {
    talkCaption.textContent = 'Voice needs Chrome on this device';
    setTimeout(() => talkCaption.textContent = 'Hold to talk', 2200);
    return;
  }
  finalTranscript = '';
  finalSegments = [];
  talkBtn.classList.add('recording');
  talkCaption.textContent = 'Listening…';
  document.querySelector('.ember-dot[data-dept="tasks"]').classList.add('listening-boost');
  try { recognizer.start(); } catch (e) { /* already started */ }
}
function stopTalk() {
  if (recognizer) { try { recognizer.stop(); } catch (e) {} }
  document.querySelector('.ember-dot[data-dept="tasks"]').classList.remove('listening-boost');
}
talkBtn.addEventListener('mousedown', startTalk);
talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalk(); }, { passive: false });
talkBtn.addEventListener('mouseup', stopTalk);
talkBtn.addEventListener('touchend', stopTalk);
talkBtn.addEventListener('mouseleave', stopTalk);

// --- Menu drawer (hamburger) — summoned, never displayed ---
function openMenu() {
  document.getElementById('menu-backdrop').classList.add('open');
  document.getElementById('menu-drawer').classList.add('open');
  loadPeople();
}
function closeMenu() {
  document.getElementById('menu-backdrop').classList.remove('open');
  document.getElementById('menu-drawer').classList.remove('open');
}
document.getElementById('menu-btn').addEventListener('click', openMenu);
document.getElementById('menu-backdrop').addEventListener('click', closeMenu);

document.getElementById('menu-report-pnl').addEventListener('click', () => {
  window.open(API + '/reports/profit-and-loss/pdf', '_blank');
});
document.getElementById('menu-report-aged').addEventListener('click', () => {
  window.open(API + '/reports/aged-debtors/pdf', '_blank');
});

async function loadPeople() {
  const data = await safeFetch('/debug/characters');
  const el = document.getElementById('menu-people');
  const people = data?.characters ?? [];
  if (!people.length) { el.innerHTML = '<div class="menu-item"><span class="sub">Nobody on file yet</span></div>'; return; }
  el.innerHTML = people.slice(0, 8).map(p => `
    <button class="menu-item">${escapeHtml(p.name)}<span class="sub">${escapeHtml(p.relationship ?? 'Contact')}</span></button>
  `).join('');
}

// --- History panel (swipe left) — a chronological journal of what
// was actually said, not a feature list. Real data, not mocked.
function openHistory() {
  document.getElementById('history-panel').classList.add('open');
  loadHistory();
}
function closeHistory() {
  document.getElementById('history-panel').classList.remove('open');
}
document.getElementById('history-close').addEventListener('click', closeHistory);

function timeAgo(iso) {
  const then = new Date(iso.replace(' ', 'T') + 'Z');
  const diffMin = Math.round((Date.now() - then.getTime()) / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.round(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  return `${Math.round(diffHr / 24)}d ago`;
}

async function loadHistory() {
  const data = await safeFetch('/debug/captures?limit=25');
  const el = document.getElementById('history-list');
  const entries = data?.captures ?? [];
  if (!entries.length) { el.innerHTML = '<div class="sheet-empty">Nothing said yet.</div>'; return; }
  el.innerHTML = entries.map(c => `
    <div class="history-entry">
      <span class="history-time">${timeAgo(c.created_at)}</span>
      <div class="history-text">${escapeHtml(c.raw_text)}</div>
    </div>
  `).join('');
}

// Real swipe-left detection on the main screen — a gesture, not a
// button, discovered rather than displayed (Principle 25).
const mainScreen = document.getElementById('main-screen');
let touchStartX = null;
mainScreen.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
mainScreen.addEventListener('touchend', (e) => {
  if (touchStartX === null) return;
  const deltaX = e.changedTouches[0].clientX - touchStartX;
  if (deltaX < -70) openHistory();
  touchStartX = null;
}, { passive: true });
// Mouse-drag fallback for desktop testing
let mouseStartX = null;
mainScreen.addEventListener('mousedown', (e) => { mouseStartX = e.clientX; });
mainScreen.addEventListener('mouseup', (e) => {
  if (mouseStartX === null) return;
  if (e.clientX - mouseStartX < -70) openHistory();
  mouseStartX = null;
});

loadCounts();
</script>
</body>
</html>
