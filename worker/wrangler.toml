name = "office-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# D1 — created via the Cloudflare API (see README for the exact curl).
# Replace REPLACE_WITH_D1_ID once that command returns a real database_id.
[[d1_databases]]
binding = "OFFICE_DB"
database_name = "office-db"
database_id = "d5343bef-3a3a-4791-860d-fbd96c546abb"

# R2 — bucket name only; no ID needed for the binding.
[[r2_buckets]]
binding = "OFFICE_VAULT"
bucket_name = "office-vault"

# Workers AI — no separate account/secret needed, this is a binding on
# the same Cloudflare account. Used for @cf/openai/whisper transcription,
# @cf/moonshotai/kimi-k2.6 extraction/rewriting, and @cf/baai/bge-base-en-v1.5
# embeddings.
[ai]
binding = "AI"

# Vectorize — the slow, batched, cross-customer associative layer.
# No longer written to or queried directly per-message — KV is the
# fast, primary per-customer memory now. Vectorize is fed by the
# hourly consolidation cron from pending_memory_flush, and reserved
# for cross-customer search (not yet built) and unscoped fallback
# lookups when no customer has been identified.
[[vectorize]]
binding = "MEMORY"
index_name = "office-memory"

# KV — fast, per-customer notes. Read/write instantly, no async
# indexing delay. This is what a lookup actually reads from now.
[[kv_namespaces]]
binding = "CUSTOMER_NOTES"
id = "5c76e3a5c8f645c29d693ce5577872a1"

[vars]
ENVIRONMENT = "production"

# Subdomain route on the existing websitehub.co.za zone — see README
# for the DNS-record curl that has to run once before this route works.
[[routes]]
pattern = "office.websitehub.co.za/*"
zone_name = "websitehub.co.za"

# Hourly consolidation: flushes pending_memory_flush into Vectorize in
# one batched upsert, and checks customer_facts for breadth-qualifying
# schema candidates. See the scheduled() handler in src/index.ts.
[triggers]
crons = ["0 * * * *"]
